<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Split PDF</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>

<header>Split PDF</header>

<div class="container">
    <div class="card">

        <h1>Split PDF</h1>

        <form method="post" action="/split" enctype="multipart/form-data">

            <input type="file" name="file" required>
            <input type="number" name="page" placeholder="Stop at page number" required>

            <button type="submit">Split PDF</button>
        </form>

        <br>
        <a href="/">← Back</a>

    </div>
</div>

</body>
</html>
