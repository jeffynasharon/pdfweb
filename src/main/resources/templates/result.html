<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Result</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>

<header>Result</header>

<div class="container">
    <div class="card">

        <h1 th:text="${message}"></h1>

        <div th:if="${originalSize != null}">
            <p>Original Size: <span th:text="${originalSize}"></span></p>
            <p>Compressed Size: <span th:text="${compressedSize}"></span></p>
        </div>

        <br>

        <a th:if="${fileName != null}"
           th:href="@{'/download/' + ${fileName}}">
            Download File
        </a>

        <br><br>
        <a href="/">← Back</a>

    </div>
</div>

</body>
</html>
